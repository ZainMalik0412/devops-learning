#cloud-config

# Update package lists and upgrade existing packages
package_update: true
package_upgrade: true

# Packages to install
packages:
  - nginx
  - curl
  - git

# Write custom files to the instance
write_files:
  - path: /var/www/html/index.html
    permissions: '0644'
    content: |
      <!DOCTYPE html>
      <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>My EC2 Server</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
              min-height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
              background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              color: #e2e8f0;
            }
            .card {
              text-align: center;
              padding: 3rem 4rem;
              background: rgba(30, 41, 59, 0.8);
              border: 1px solid rgba(148, 163, 184, 0.15);
              border-radius: 1rem;
              backdrop-filter: blur(10px);
              box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            }
            h1 {
              font-size: 2rem;
              font-weight: 700;
              margin-bottom: 0.75rem;
              background: linear-gradient(to right, #38bdf8, #818cf8);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            }
            .tags {
              display: flex;
              gap: 0.5rem;
              justify-content: center;
              margin-top: 1.5rem;
            }
            .tag {
              padding: 0.35rem 0.85rem;
              border-radius: 9999px;
              font-size: 0.8rem;
              font-weight: 500;
              background: rgba(56, 189, 248, 0.1);
              border: 1px solid rgba(56, 189, 248, 0.25);
              color: #7dd3fc;
            }
            .subtitle {
              color: #94a3b8;
              font-size: 0.95rem;
            }
          </style>
        </head>
        <body>
          <div class="card">
            <h1>Hello from EC2 + cloud-init + Terraform!</h1>
            <p class="subtitle">Automated deployment with infrastructure as code</p>
            <div class="tags">
              <span class="tag">EC2</span>
              <span class="tag">cloud-init</span>
              <span class="tag">Terraform</span>
              <span class="tag">NGINX</span>
            </div>
          </div>
        </body>
      </html>

  - path: /etc/nginx/sites-available/default
    permissions: '0644'
    content: |
      server {
        listen 80 default_server;
        listen [::]:80 default_server;

        root /var/www/html;
        index index.html;

        server_name _;

        location / {
          try_files $uri $uri/ =404;
        }
      }

# Commands to run after packages are installed
runcmd:
  - systemctl enable nginx
  - systemctl start nginx
  - systemctl reload nginx
  - echo "cloud-init complete" >> /var/log/cloud-init-done.log